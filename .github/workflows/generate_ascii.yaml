name: Generate ASCII Artwork

on: push

jobs:
    build_job_1:
        runs-on: ubuntu-latest

        steps:
        - name: Install Cowsay
          run: sudo apt-get install cowsay -y

        - name: Execute Cowsay Cmd 
          run: cowsay -f dragon "Run for cover, I am a DRAGON... RAWR" >> dragon.txt

        - name: Upload Dragon generated file
          uses: actions/upload-artifact@v7
          with:
            name: dragon.txt
            path: dragon.txt

    test_job_2:
        needs: build_job_1
        runs-on: ubuntu-latest

        steps:
        - name: Download Dragon generated file
          uses: actions/download-artifact@v8
          with:
            name: dragon.txt

        - name: Test File Exists
          run: grep -i "dragon" dragon.txt

    deploy_job_3:
        needs: [test_job_2]
        runs-on: ubuntu-latest

        steps:
        - name: Download Dragon generated file
          uses: actions/download-artifact@v8
          with:
            name: dragon.txt

        - name: Read file
          run: cat dragon.txt

        - name: Deploy
          run: echo Deploying ... .. .
