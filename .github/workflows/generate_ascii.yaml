name: Generate ASCII Artwork

on: push

jobs:
    acii_job:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout repo
          uses: actions/checkout@v6

        - name: List repo Files
          run: ls -ltra

        - name: Executing Shell Script
          run: |
            cd .github/workflows
            chmod +x ascii-script.sh
            ./ascii-script.sh
